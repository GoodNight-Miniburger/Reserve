<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>晚安小堡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F2E8D5;--cream2:#EDE0C4;--card:#FEFAF3;--border:#D9C8A8;--text:#2C1F0E;--muted:#7A6548;--accent:#8B4513}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
/* Header */
header{background:var(--cream2);border-bottom:2px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:10}
.hi{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:78px}
.logo img{height:64px;display:block}
.cart-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:14px;font-weight:500;color:var(--text);font-family:inherit}
.cart-count{background:var(--accent);color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
/* Type bar */
.type-bar{background:var(--card);border-bottom:2px solid var(--border);padding:12px 20px}
.ti{max-width:700px;margin:0 auto;display:flex;align-items:center;gap:12px}
.type-lbl{font-size:13px;font-weight:500;color:var(--muted)}
.toggle-group{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.t-btn{padding:6px 20px;font-size:14px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .15s}
.t-btn.active{background:var(--accent);color:#fff}
/* Menu */
main{max-width:700px;margin:0 auto;padding:16px 20px 120px}
.cat-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:24px 0 10px;padding-bottom:4px;border-bottom:1.5px solid var(--border)}
.cat-title:first-child{margin-top:0}
.menu-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.menu-card:hover{border-color:#c8b89a}
.card-inner{display:flex;gap:12px;align-items:flex-start;padding:14px}
.item-thumb{width:80px;height:80px;border-radius:8px;background:var(--cream2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;border:1px solid var(--border);overflow:hidden}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-body{flex:1;min-width:0}
.item-top{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.item-name{font-size:14px;font-weight:700;line-height:1.3}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.b-red{background:#FEE2E0;border:1px solid #E8A09A;color:#8B2218}
.b-blue{background:#E0EFF8;border:1px solid #7AB0D4;color:#1A4D7A}
.b-purple{background:#EDE0F8;border:1px solid #B07AD4;color:#4D1A7A}
.b-green{background:#E0F8E8;border:1px solid #7AD4A0;color:#1A7A4D}
.item-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.sizes-row{display:flex;flex-wrap:wrap;gap:6px}
.size-tag{border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;background:#fff;color:var(--text);display:flex;align-items:center;gap:4px}
.size-qty-badge{background:var(--accent);color:#fff;border-radius:10px;font-size:11px;font-weight:700;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center}
.add-icon{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-left:auto;flex-shrink:0;margin-top:4px}
/* Footer */
.cart-footer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--border);padding:14px 20px;z-index:10}
.cfi{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.cf-info{font-size:13px;color:var(--muted)}
.cf-total{font-size:16px;font-weight:700;margin-top:2px}
.checkout-btn{padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.checkout-btn:hover{opacity:.9}
.checkout-btn:disabled{opacity:.4;cursor:default}
/* Overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20}
.overlay.open{display:block}
/* Drawers */
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:18px 18px 0 0;z-index:21;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s ease}
.drawer.open{transform:translateY(0)}
.dhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.dhead{padding:12px 20px 0;display:flex;align-items:center;justify-content:space-between}
.dtitle{font-size:16px;font-weight:700}
.dscroll{flex:1;overflow-y:auto;padding:12px 20px 20px}
/* Customization drawer */
.cust-item-header{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1.5px solid var(--border);margin-bottom:12px}
.cust-thumb{width:52px;height:52px;border-radius:8px;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid var(--border);overflow:hidden;flex-shrink:0}
.cust-thumb img{width:100%;height:100%;object-fit:cover}
.cust-name{font-size:15px;font-weight:700}
.cust-size-lbl{font-size:12px;color:var(--muted);margin-top:2px}
.section-hdr{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:14px 0 10px;display:flex;align-items:center;gap:6px}
.section-hdr .sub{font-size:11px;font-weight:400;text-transform:none;letter-spacing:0}
/* Addon grid */
.addon-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.addon-item{border:1.5px dashed var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:8px}
.addon-item.sel{border-color:var(--accent);border-style:solid;background:#FDF5EC}
.addon-chk{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.addon-item.sel .addon-chk{background:var(--accent);border-color:var(--accent);color:#fff}
.addon-lbl .addon-nm{font-size:13px;font-weight:500}
.addon-lbl .addon-pr{font-size:12px;color:var(--accent);font-weight:500}
/* Combo list */
.combo-list{display:flex;flex-direction:column;gap:8px}
.combo-item{border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:10px}
.combo-item.sel{border-color:var(--accent);background:#FDF5EC}
.combo-radio{width:18px;height:18px;border:1.5px solid var(--border);border-radius:50%;flex-shrink:0;position:relative}
.combo-item.sel .combo-radio{border-color:var(--accent)}
.combo-item.sel .combo-radio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--accent)}
.combo-lbl{flex:1}
.combo-nm{font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px}
.combo-cbadge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.cb-amber{background:#FAEEDA;color:#633806;border:1px solid #EF9F27}
.cb-green{background:#EAF3DE;color:#27500A;border:1px solid #639922}
.cb-red{background:#FEE2E0;color:#8B2218;border:1px solid #E8A09A}
.cb-blue{background:#E0EFF8;color:#1A4D7A;border:1px solid #7AB0D4}
.combo-desc{font-size:11px;color:var(--muted);margin-top:2px}
.combo-price{font-size:14px;font-weight:700;flex-shrink:0}
/* Cust footer */
.cust-footer{border-top:1.5px solid var(--border);padding:14px 20px;background:var(--card);flex-shrink:0;display:flex;align-items:center;gap:14px}
.qty-ctrl{display:flex;align-items:center;gap:10px}
.qty-btn{width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:transparent;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:inherit}
.qty-btn:hover{background:var(--cream2)}
.qty-num{font-size:16px;font-weight:700;min-width:24px;text-align:center}
.confirm-btn{flex:1;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.confirm-btn:hover{opacity:.9}
/* Cart drawer */
.cart-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.cart-row:last-child{border:none}
.cr-info{flex:1;min-width:0}
.cr-name{font-size:14px;font-weight:500;color:var(--text)}
.cr-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
.cr-price-unit{font-size:11px;color:var(--accent);margin-top:2px}
.cr-qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cq-btn{width:26px;height:26px;border:1.5px solid var(--border);border-radius:6px;background:transparent;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:inherit;line-height:1}
.cq-btn:hover{background:var(--cream2)}
.cq-num{font-size:14px;font-weight:700;min-width:20px;text-align:center}
.cr-total{font-size:14px;font-weight:700;min-width:48px;text-align:right;flex-shrink:0}
.cr-del{width:24px;height:24px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1}
.cr-del:hover{color:#C0392B}
.empty-cart{text-align:center;padding:32px 0;color:var(--muted);font-size:14px}
.total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding:14px 0 12px;border-top:2px solid var(--border);margin-top:6px}
.confirm-order-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.confirm-order-btn:hover{opacity:.9}
.confirm-order-btn:disabled{opacity:.4;cursor:default}
/* Confirm step */
.confirm-header{font-size:13px;color:var(--muted);margin-bottom:12px}
.conf-type-row{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1.5px solid var(--border);margin-bottom:8px}
.conf-item-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--text)}
.conf-item-sub{font-size:11px;color:var(--muted);padding-bottom:3px}
.conf-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding-top:10px;border-top:1.5px solid var(--border);margin-top:6px;margin-bottom:16px}
.submit-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.4;cursor:default}
.back-btn{background:transparent;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--muted)}
.back-btn:hover{background:var(--cream2)}
/* Success modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:18px;padding:28px 24px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto}
.modal-box h2{font-size:17px;font-weight:700;text-align:center;margin-bottom:14px}
.modal-order-num{font-size:48px;font-weight:700;color:var(--accent);text-align:center;letter-spacing:.05em;margin:6px 0 4px}
.modal-type-badge{display:inline-block;font-size:14px;font-weight:600;padding:5px 18px;border-radius:20px}
.modal-type-wrap{text-align:center;margin-bottom:16px}
.modal-divider{border:none;border-top:1.5px solid var(--border);margin:12px 0}
.modal-item-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.modal-item-sub{font-size:11px;color:var(--muted);padding-bottom:3px}
.modal-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding-top:10px;border-top:2px solid var(--border);margin-top:6px}
.modal-notice{background:#FEF3CD;border:1.5px solid #e8c97a;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:600;color:#8a6200;text-align:center;margin:16px 0;line-height:1.6}
.modal-close-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-close-btn:hover{opacity:.9}
/* Toast */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--text);color:#fff;padding:12px 22px;border-radius:20px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:40;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.menu-card{position:relative}
    .menu-card.sold-out{opacity:.7;cursor:default;border-color:#E8A09A !important}
    .menu-card.sold-out:hover{border-color:#E8A09A}
    .sold-out-overlay{position:absolute;top:0;right:0;bottom:0;width:64px;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .sold-badge{display:flex;align-items:center;justify-content:center;width:46px;height:46px;border:2.5px solid #C0392B;border-radius:6px;color:#C0392B;font-size:14px;font-weight:900;line-height:1.1;text-align:center;background:rgba(255,255,255,.88);writing-mode:vertical-rl;text-orientation:upright;word-break:keep-all;letter-spacing:.05em}
    .addon-item.sold-out{opacity:.45;cursor:not-allowed;border-color:var(--border) !important;border-style:dashed !important;background:#fff !important}
    .combo-item.sold-out{opacity:.5;cursor:not-allowed}
    .combo-sold-label{font-size:11px;font-weight:700;color:#C0392B;background:#FEE2E0;border:1px solid #E8A09A;border-radius:6px;padding:1px 7px;margin-left:6px}
    .warn-bar{background:#FEF3CD;border:1.5px solid #e8c97a;border-radius:10px;padding:10px 14px;font-size:13px;color:#8a6200;margin-bottom:16px;display:none}
.warn-bar.show{display:block}

    /* LINE Login */
    .line-login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;align-items:center;justify-content:center;padding:24px}
    .line-login-overlay.open{display:flex}
    .line-login-box{background:var(--card);border-radius:20px;padding:32px 28px;width:100%;max-width:360px;text-align:center}
    .line-login-icon{width:56px;height:56px;background:#06C755;border-radius:16px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:28px}
    .line-login-title{font-size:17px;font-weight:700;margin-bottom:8px}
    .line-login-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
    .line-login-btn{width:100%;padding:14px;background:#06C755;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px}
    .line-login-btn:hover{opacity:.9}
    .line-user-bar{display:none;align-items:center;gap:8px;padding:6px 14px;background:#E8F8EE;border:1.5px solid #7AC97A;border-radius:20px;font-size:13px;font-weight:600;color:#1A6B28}
    .line-user-bar.show{display:flex}
    .line-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid #7AC97A}
    /* Phone + time picker */
    .extra-fields{padding:12px 0 4px;display:flex;flex-direction:column;gap:10px}
    .ef-row{display:flex;flex-direction:column;gap:4px}
    .ef-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
    .ef-input{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);width:100%}
    .ef-input:focus{outline:none;border-color:var(--accent)}
    .ef-input.err{border-color:#E8A09A}
    .ef-hint{font-size:11px;color:var(--muted);margin-top:2px}
    .ef-err{font-size:12px;color:#C0392B;margin-top:2px;display:none}
    .ef-err.show{display:block}
    .line-name-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#E8F8EE;border:1.5px solid #7AC97A;border-radius:10px;font-size:13px;font-weight:600;color:#1A6B28}
    /* Time slot picker */
    .time-slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:6px}
    .ts-btn{padding:8px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:500;background:#fff;cursor:pointer;font-family:inherit;text-align:center;color:var(--text)}
    .ts-btn:hover{border-color:var(--accent)}
    .ts-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
    .ts-btn.full{opacity:.4;cursor:not-allowed;background:var(--cream2);text-decoration:line-through}
    /* Shop status overlay */
    .shop-overlay{display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;padding:24px}
    .shop-overlay.show{display:flex}
    .shop-overlay-bg{position:absolute;inset:0;background:rgba(242,232,213,.88)}
    .shop-notice{position:relative;text-align:center;max-width:320px}
    .shop-icon{font-size:56px;margin-bottom:12px;line-height:1;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji','Android Emoji',sans-serif}
    .shop-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3}
    .shop-sub{font-size:15px;color:var(--muted);line-height:1.6}
</style>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

/* 確認 Firebase SDK 載入成功 */
if(typeof firebase==='undefined'){
  document.write('<sc'+'ript src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-app-compat.min.js"><\/sc'+'ript>');
  document.write('<sc'+'ript src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-database-compat.min.js"><\/sc'+'ript>');
}
</script>
</head>
<body>

function getAvailableSlots(){
  var parts=bookingSettings.earliestTime.split(':');
  var baseMin=parseInt(parts[0]||19)*60+parseInt(parts[1]||0);
  var perSlot=bookingSettings.ordersPerSlot||2;
  var dur=bookingSettings.slotDuration||10;
  var MAX_TIME_MIN=22*60; /* 最晚 22:00 */
  var numSlots=Math.ceil((MAX_TIME_MIN-baseMin)/dur);
  /* Count today's reservations per slot */
  var slotCounts={};
  var todayRange=getTodayRange();
  Object.values(orders||{}).forEach(function(o){
    if(o.reservationTime&&o.createdAt&&o.createdAt>=todayRange.start&&o.createdAt<=todayRange.end&&o.orderType==='預定客'){
      slotCounts[o.reservationTime]=(slotCounts[o.reservationTime]||0)+1;
    }
  });
  var now=new Date();
  var nowMin=now.getHours()*60+now.getMinutes();
  var slots=[];
  for(var i=0;i<numSlots;i++){
    var slotMin=baseMin+(i+1)*dur;
    var h=Math.floor(slotMin/60)%24;
    var m=slotMin%60;
    var label=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    var count=slotCounts[label]||0;
    var full=count>=perSlot;
    var past=slotMin<nowMin+5; /* must be at least 5 mins in future */
    if(!past&&slotMin<=MAX_TIME_MIN) slots.push({label:label,full:full,count:count,max:perSlot});
  }
  return slots;
}

function renderTimeSlots(){
  var container=document.getElementById('time-slots');
  if(!container) return;
  var slots=getAvailableSlots();
  if(!slots.length){ container.innerHTML='<div style="font-size:12px;color:var(--muted)">今日暫無可預定時段</div>'; return; }
  container.innerHTML=slots.map(function(s){
    return '<button class="ts-btn'+(s.full?' full':reservationTime===s.label?' sel':'')+'"'
      +(s.full?' disabled':' data-slot="'+s.label+'"')+'>'+s.label
      +'<div style="font-size:10px;margin-top:2px;opacity:.7">'+(s.full?'已滿':s.max-s.count+' 位')+'</div></button>';
  }).join('');
  container.querySelectorAll('[data-slot]').forEach(function(btn){
    btn.addEventListener('click',function(){
      reservationTime=btn.getAttribute('data-slot');
      renderTimeSlots();
      document.getElementById('time-err').classList.remove('show');
    });
  });
}

function calcResSlot(n){
  var slotNum=Math.ceil((n+1)/bookingSettings.ordersPerSlot);
  var parts=bookingSettings.earliestTime.split(':');
  var tot=parseInt(parts[0]||19)*60+parseInt(parts[1]||0)+slotNum*bookingSettings.slotDuration;
  return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}

function getTodayRange(){
  var now=new Date();
  var start=new Date(now);
  if(now.getHours()<8) start.setDate(start.getDate()-1);
  start.setHours(8,0,0,0);
  var end=new Date(start);
  end.setDate(end.getDate()+1);
  end.setHours(7,59,59,999);
  return{start:start.getTime(),end:end.getTime()};
}
function calcUnit(){
  var base=custState.size?custState.size.price:0;
  var asum=0;
  custState.addons.forEach(function(aid){
    var a=addonsDB.find(function(x){return x.id===aid;});
    if(a)asum+=a.price;
  });
  var cPrice=(custState.combo&&custState.combo.addPrice>0)?custState.combo.addPrice:0;
  return base+asum+cPrice;
}

/* Submit order */
document.getElementById('submit-btn').addEventListener('click',async function(){
  if(!fbDB||!fbFns){showToast('請先設定 Firebase');return;}
  /* LIFF guarantees login - get profile if not yet loaded */
  if(!lineUserId){
    try{
      if(liff.isLoggedIn()){
        var profile=await liff.getProfile();
        lineUserId=profile.userId;
        lineDisplayName=profile.displayName;
        showLineUserBar(profile);
      }
    }catch(e){ console.warn('Could not get LINE profile',e); }
  }
  if(!fbDB||!fbFns){showToast('請先設定 Firebase');return;}
  if(!cart.length)return;
  var total=cart.reduce(function(s,e){return s+e.unitPrice*e.qty;},0);
  try{
    /* Daily counter: resets each business day (8:00 AM cutoff) */
    var now=new Date();
    var bizDate=new Date(now);
    if(now.getHours()<8) bizDate.setDate(bizDate.getDate()-1);
    var bizDay=bizDate.getFullYear()+'-'
      +String(bizDate.getMonth()+1).padStart(2,'0')+'-'
      +String(bizDate.getDate()).padStart(2,'0');
    var result=await fbFns.runTransaction(fbFns.ref(fbDB,'dailyCounter/'+bizDay),function(c){return(c||0)+1;});
    var orderNum=String(result.snapshot.val()).padStart(4,'0');
    var savedCart=cart.slice();
    await fbFns.push(fbFns.ref(fbDB,'orders'),{
      orderNum:orderNum,orderType:orderType,
      lineUserId:lineUserId||'',
      lineDisplayName:lineDisplayName||'',
      phoneNumber:document.getElementById('phone-input').value.trim(),
      items:savedCart.map(function(e){return{
        name:e.name,size:e.size,cat:e.cat||'漢堡',basePrice:e.basePrice,
        addons:e.addons.map(function(a){return{name:a.name,price:a.price};}),
        combo:e.combo&&(e.combo.addPrice||e.combo.price||0)>0?{name:e.combo.name+(e.combo.badge?' '+e.combo.badge:''),baseName:e.combo.name,addPrice:e.combo.addPrice||e.combo.price||0}:null,
        unitPrice:e.unitPrice,qty:e.qty
      };}),
      reservationTime:orderType==='預定客'?reservationTime:'',
      total:total,status:'pending',createdAt:fbFns.serverTimestamp()
    });
    /* ── Auto-deduct inventory ── */
    try{
      if(Object.keys(recipesDB).length){
        function deductIng(ingId, qty){
          /* Immediately deduct from currentStock */
          fbFns.ref(fbDB,'ingredients/'+ingId+'/currentStock').transaction(function(cur){
            return Math.max(0,(cur||0)-qty);
          });
        }
        savedCart.forEach(function(cartItem){
          /* Deduct main item */
          var rec=Object.values(recipesDB).find(function(r){
            return r.itemName===cartItem.name&&r.size===cartItem.size;
          }) || Object.values(recipesDB).find(function(r){
            /* Fallback: match by base name (without note) */
            return cartItem.name.indexOf(r.itemName)===0&&r.size===cartItem.size;
          });
          if(rec&&rec.ingredients){
            Object.entries(rec.ingredients).forEach(function(kv){
              deductIng(kv[0], kv[1]*(cartItem.qty||1));
            });
          }
          /* Deduct combo if selected */
          if(cartItem.combo&&(cartItem.combo.addPrice||cartItem.combo.price||0)>0){
            /* Try baseName first, then strip discount note from full name */
            var cBaseName=cartItem.combo.baseName||cartItem.combo.name.replace(/\s*(套餐優惠|折\d+元|優惠|折扣).*/,'').trim();
            var comboRec=Object.values(recipesDB).find(function(r){
              return r.itemName==='[套餐]'+cBaseName&&r.size==='單一';
            })||Object.values(recipesDB).find(function(r){
              return r.itemName==='[套餐]'+cartItem.combo.name&&r.size==='單一';
            });
            if(comboRec&&comboRec.ingredients){
              Object.entries(comboRec.ingredients).forEach(function(kv){
                deductIng(kv[0], kv[1]*(cartItem.qty||1));
              });
            }
          }
        });
      }
    }catch(ie){console.warn('庫存扣除失敗',ie);}
    cart=[];
    renderMenu();
    updateFooter();
    closeAll();
    /* Show success modal */
    document.getElementById('sm-num').textContent='#'+orderNum;
    var smType=document.getElementById('sm-type');
    smType.textContent=orderType;
    smType.style.cssText=orderType==='預定客'
      ?'background:#F1E8E8;color:#6B1A1A;border:1.5px solid #C97A7A;display:inline-block;font-size:14px;font-weight:600;padding:5px 18px;border-radius:20px'
      :'background:#E8F1E8;color:#1A6B28;border:1.5px solid #7AC97A;display:inline-block;font-size:14px;font-weight:600;padding:5px 18px;border-radius:20px';
    var smRes=document.getElementById('sm-res');
    if(smRes){if(orderType==='預定客'&&reservationTime){smRes.textContent='📅 預計取餐時間：'+reservationTime;smRes.style.display='block';}else{smRes.style.display='none';}}
    document.getElementById('sm-items').innerHTML=savedCart.map(function(e){
      var subs=[];
      if(e.addons&&e.addons.length)subs.push('加點：'+e.addons.map(function(a){return a.name;}).join('、'));
      if(e.combo)subs.push('套餐：'+e.combo.name+(e.combo.badge?' '+e.combo.badge:''));
      return '<div class="modal-item-row"><span>'+e.name+'（'+e.size+'）× '+e.qty+'</span><span>$'+(e.unitPrice*e.qty)+'</span></div>'+
        (subs.length?'<div class="modal-item-sub">'+subs.join(' · ')+'</div>':'');
    }).join('');
    document.getElementById('sm-total').textContent='$'+total;
    document.getElementById('success-modal').classList.add('open');
    /* Auto-navigate back to LINE after 5 seconds if in LIFF */
    if(typeof liff!=='undefined'&&liff.isInClient()){
      setTimeout(async function(){
        try{ await liff.closeWindow(); }catch(e){}
      }, 5000);
    }
    /* ── Send LINE confirmation via Netlify Function ── */
    try{
      if(lineUserId){
        var itemLines=savedCart.map(function(e){
          var line=e.name+'（'+e.size+'）× '+e.qty+' — $'+(e.unitPrice*e.qty);
          if(e.addons&&e.addons.length) line+='\n  加點：'+e.addons.map(function(a){return a.name;}).join('、');
          if(e.combo&&(e.combo.addPrice||0)>0) line+='\n  套餐：'+e.combo.name;
          return line;
        }).join('\n');
        var resLine=orderType==='預定客'&&reservationTime?'\n📅 預計取餐：'+reservationTime:'';
        var ph2=document.getElementById('phone-input').value.trim();
        var msgText='✅ 訂單確認！\n\n'
          +'━━━━━━━━━━━━━━\n'
          +'🏷️ 訂單編號：#'+orderNum+'\n'
          +'👤 '+orderType+resLine+'\n'
          +(ph2?'📱 手機：'+ph2+'\n':'')
          +'━━━━━━━━━━━━━━\n'
          +itemLines+'\n'
          +'━━━━━━━━━━━━━━\n'
          +'💰 合計：$'+total+'\n\n'
          +'感謝光臨晚安小堡 🍔';
        fetch('/functions/push-line',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({userId:lineUserId,message:msgText})
        }).catch(function(e){console.warn('push-line failed',e);});
      }
    }catch(le){console.warn('LINE msg error',le);}
  }catch(err){showToast('送出失敗，請確認網路');console.error(err);}
});

function updateFooter(){

  document.getElementById('checkout-btn').disabled=!count;
}

  var t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);
}

(async function initLiff(){

    if(!liff.isInClient()&&!liff.isLoggedIn()){
      liff.login({redirectUri:location.href});

    if(liff.isLoggedIn()){
      var profile=await liff.getProfile();
      lineUserId=profile.userId;
      lineDisplayName=profile.displayName;
      showLineUserBar(profile);

  bar.classList.add('show');

}

    };

      if(data&&Object.keys(data).length>0){

      }else{menuItems=DEFAULT_MENU.slice();}
      renderMenu();
    });
    db.ref('addons').on('value',function(snap){
      var data=snap.val();
      addonsDB=data?Object.entries(data).map(function(e){return Object.assign({},e[1],{id:e[0]});})
        .sort(function(a,b){return(a.sortOrder||99)-(b.sortOrder||99);}):DEFAULT_ADDONS.slice();
    });
    db.ref('combos').on('value',function(snap){
      var data=snap.val();
      if(data){
        combosDB=Object.entries(data).map(function(e){
            var c=Object.assign({},e[1],{id:e[0]});
            if(c.addPrice==null&&c.price!=null) c.addPrice=c.price;
            return c;
          }).filter(function(c){return (c.addPrice||0)>0;})
          .sort(function(a,b){return(a.sortOrder||99)-(b.sortOrder||99);});
      }else{combosDB=[];}
    });
    /* 預定設定 */
    db.ref('settings/shopStatus').on('value',function(snap){
      applyShopStatus(snap.val()||'open');
    });
    db.ref('settings/booking').on('value',function(snap){
      var d=snap.val();
      if(d){
        if(d.earliestTime) bookingSettings.earliestTime=d.earliestTime;
        if(d.ordersPerSlot) bookingSettings.ordersPerSlot=Number(d.ordersPerSlot);
        if(d.slotDuration) bookingSettings.slotDuration=Number(d.slotDuration);
      }
      if(orderType==='預定客') updateResDisplay();
    });
    /* 今日預定數量（用於計算時段） */
    db.ref('orders').on('value',function(snap){
      var data=snap.val()||{};
      orders=data; /* update local orders cache for time slot calc */
      var range=getTodayRange();
      todayReservationCount=Object.values(data).filter(function(o){
        return o.orderType==='預定客'&&o.createdAt&&o.createdAt>=range.start&&o.createdAt<=range.end;

    db.ref('recipes').on('value',function(snap){
      recipesDB={};

    });
  }catch(err){
    console.warn('Firebase 未設定',err);
    document.getElementById('offline-warn').classList.add('show');
  }
})();
